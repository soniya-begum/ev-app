<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV vs Petrol Cost Calculator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;
        const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell } = Recharts;

        function App() {
            const [dailyDistance, setDailyDistance] = useState(50);
            const [petrolMileage, setPetrolMileage] = useState(15);
            const [fuelPrice, setFuelPrice] = useState(100);
            const [evEfficiency, setEvEfficiency] = useState(7);
            const [electricityCost, setElectricityCost] = useState(8);
            const [extraEvCost, setExtraEvCost] = useState(400000);

            const results = useMemo(() => {
                const safePetrolMileage = petrolMileage || 1;
                const safeEvEfficiency = evEfficiency || 1;
                const monthlyPetrolCost = (dailyDistance / safePetrolMileage) * fuelPrice * 30;
                const monthlyEvCost = (dailyDistance / safeEvEfficiency) * electricityCost * 30;
                const monthlySavings = monthlyPetrolCost - monthlyEvCost;
                const yearlySavings = monthlySavings * 12;
                const breakEvenMonths = monthlySavings > 0 ? extraEvCost / monthlySavings : -1;
                const co2Saved = (dailyDistance / safePetrolMileage) * 2.3 * 30;

                return { monthlyPetrolCost, monthlyEvCost, monthlySavings, yearlySavings, breakEvenMonths, co2Saved };
            }, [dailyDistance, petrolMileage, fuelPrice, evEfficiency, electricityCost, extraEvCost]);

            const formatBreakEven = (months) => {
                if (months < 0) return "No Break-even";
                if (months === 0) return "Instant";
                const years = Math.floor(months / 12);
                const rem = Math.round(months % 12);
                return years === 0 ? `${rem} Months` : `${years}y ${rem}m`;
            };

            const chartData = [
                { name: 'Petrol', cost: Math.round(results.monthlyPetrolCost), fill: '#ef4444' },
                { name: 'EV', cost: Math.round(results.monthlyEvCost), fill: '#22c55e' },
            ];

            return (
                <div class="p-4 md:p-8 max-w-6xl mx-auto">
                    <header class="mb-8 flex items-center gap-3">
                        <div class="bg-emerald-500 p-2 rounded-lg text-white">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="8" x2="16" y1="10" y2="10"/><line x1="8" x2="16" y1="14" y2="14"/><line x1="8" x2="16" y1="18" y2="18"/></svg>
                        </div>
                        <h1 class="text-2xl md:text-3xl font-bold">EV vs Petrol <span class="text-emerald-600">Calculator</span></h1>
                    </header>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 space-y-4">
                            <h2 class="font-bold text-lg mb-4">Input Details</h2>
                            <Input label="Daily Distance (km)" value={dailyDistance} onChange={setDailyDistance} />
                            <Input label="Petrol Mileage (km/L)" value={petrolMileage} onChange={setPetrolMileage} />
                            <Input label="Fuel Price (₹/L)" value={fuelPrice} onChange={setFuelPrice} />
                            <Input label="EV Efficiency (km/unit)" value={evEfficiency} onChange={setEvEfficiency} />
                            <Input label="Electricity Cost (₹/unit)" value={electricityCost} onChange={setElectricityCost} />
                            <Input label="Extra EV Cost (₹)" value={extraEvCost} onChange={setExtraEvCost} />
                        </div>

                        <div class="lg:col-span-2 space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <Card title="Monthly Petrol" value={results.monthlyPetrolCost} color="text-red-500" />
                                <Card title="Monthly EV" value={results.monthlyEvCost} color="text-emerald-500" />
                                <Card title="Yearly Savings" value={results.yearlySavings} color="text-blue-500" />
                                <Card title="Break-even" value={formatBreakEven(results.breakEvenMonths)} color="text-amber-500" isRaw />
                            </div>
                            
                            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                <h3 class="font-bold mb-4">Cost Comparison</h3>
                                <div style={{ width: '100%', height: 250 }}>
                                    <ResponsiveContainer>
                                        <BarChart data={chartData}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                            <XAxis dataKey="name" />
                                            <YAxis />
                                            <Tooltip />
                                            <Bar dataKey="cost">
                                                {chartData.map((entry, index) => <Cell key={index} fill={entry.fill} />)}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Input({ label, value, onChange }) {
            return (
                <div>
                    <label class="text-xs font-semibold text-slate-500 uppercase">{label}</label>
                    <input type="number" value={value} onChange={e => onChange(Number(e.target.value))} class="w-full p-2 border rounded mt-1" />
                </div>
            );
        }

        function Card({ title, value, color, isRaw }) {
            return (
                <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                    <p class="text-sm text-slate-500">{title}</p>
                    <p class={`text-2xl font-bold ${color}`}>
                        {isRaw ? value : `₹${Math.round(value).toLocaleString('en-IN')}`}
                    </p>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
