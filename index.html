<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV vs Petrol Cost Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --petrol-red: #ff4d4d;
            --ev-green: #2ecc71;
            --dark-blue: #2c3e50;
            --light-gray: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-gray);
            margin: 0;
            padding: 20px;
            color: var(--dark-blue);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; color: var(--dark-blue); }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* Input Styling */
        .input-section {
            background: #fff;
            padding: 20px;
            border-right: 1px solid #eee;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background-color: var(--ev-green);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background-color: #27ae60; }

        /* Results Styling */
        .results-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .result-card {
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .petrol-bg { background-color: #fff1f1; border-left: 5px solid var(--petrol-red); }
        .ev-bg { background-color: #f1fff6; border-left: 5px solid var(--ev-green); }
        .savings-bg { background-color: #ebf5fb; border-left: 5px solid #3498db; }

        .val { font-weight: bold; font-size: 1.1rem; }

        .highlight-box {
            background: var(--dark-blue);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-top: 20px;
        }

        canvas { margin-top: 20px; max-height: 250px; }

        /* Responsive Design */
        @media (max-width: 768px) {
            .main-grid { grid-template-columns: 1fr; }
            .input-section { border-right: none; border-bottom: 1px solid #eee; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚗 EV vs Petrol Calculator</h1>
    
    <div class="main-grid">
        <div class="input-section">
            <div class="input-group">
                <label>Daily Distance (km)</label>
                <input type="number" id="distance" value="50">
            </div>
            <div class="input-group">
                <label>Petrol Mileage (km/L)</label>
                <input type="number" id="mileage" value="15">
            </div>
            <div class="input-group">
                <label>Fuel Price (₹/Litre)</label>
                <input type="number" id="fuelPrice" value="105">
            </div>
            <hr>
            <div class="input-group">
                <label>EV Efficiency (km/Unit)</label>
                <input type="number" id="evEff" value="7">
            </div>
            <div class="input-group">
                <label>Electricity Cost (₹/Unit)</label>
                <input type="number" id="elecPrice" value="8">
            </div>
            <div class="input-group">
                <label>Extra Cost of EV (₹ Upfront)</label>
                <input type="number" id="extraCost" value="400000">
            </div>
            <button onclick="calculate()">Calculate Savings</button>
        </div>

        <div class="results-section">
            <div class="result-card petrol-bg">
                <span>Monthly Petrol Cost:</span>
                <span class="val" id="resPetrol">₹0</span>
            </div>
            <div class="result-card ev-bg">
                <span>Monthly EV Cost:</span>
                <span class="val" id="resEV">₹0</span>
            </div>
            <div class="result-card savings-bg">
                <span>Monthly Savings:</span>
                <span class="val" id="resMonthlySave">₹0</span>
            </div>
            <div class="result-card savings-bg">
                <span>Yearly Savings:</span>
                <span class="val" style="color: #27ae60;" id="resYearlySave">₹0</span>
            </div>
            <div class="result-card">
                <span>Break-even Time:</span>
                <span class="val" id="resBreakeven">0 Months</span>
            </div>
            <div class="result-card">
                <span>CO2 Saved (Monthly):</span>
                <span class="val" id="resCO2">0 kg</span>
            </div>

            <canvas id="costChart"></canvas>
        </div>
    </div>

    <div class="highlight-box" id="summaryMsg">
        Enter details and click calculate to see your potential savings!
    </div>
</div>

<script>
    let chart; // Global variable for the chart instance

    function calculate() {
        // 1. Get Inputs
        const dist = parseFloat(document.getElementById('distance').value);
        const mileage = parseFloat(document.getElementById('mileage').value);
        const fuelPrice = parseFloat(document.getElementById('fuelPrice').value);
        const evEff = parseFloat(document.getElementById('evEff').value);
        const elecPrice = parseFloat(document.getElementById('elecPrice').value);
        const extraCost = parseFloat(document.getElementById('extraCost').value);

        // 2. Perform Calculations
        const monthlyPetrol = (dist / mileage) * fuelPrice * 30;
        const monthlyEV = (dist / evEff) * elecPrice * 30;
        const monthlySave = monthlyPetrol - monthlyEV;
        const yearlySave = monthlySave * 12;
        const breakEven = extraCost / monthlySave;
        
        // CO2: (Total Litres used * 2.3kg)
        const co2Saved = (dist / mileage) * 30 * 2.3;

        // 3. Update UI
        document.getElementById('resPetrol').innerText = `₹${monthlyPetrol.toFixed(0)}`;
        document.getElementById('resEV').innerText = `₹${monthlyEV.toFixed(0)}`;
        document.getElementById('resMonthlySave').innerText = `₹${monthlySave.toFixed(0)}`;
        document.getElementById('resYearlySave').innerText = `₹${yearlySave.toFixed(0)}`;
        document.getElementById('resBreakeven').innerText = `${breakEven.toFixed(1)} Months`;
        document.getElementById('resCO2').innerText = `${co2Saved.toFixed(1)} kg`;

        document.getElementById('summaryMsg').innerText = 
            `You save ₹${yearlySave.toLocaleString()} per year by switching to EV!`;

        updateChart(monthlyPetrol, monthlyEV);
    }

    function updateChart(pCost, eCost) {
        const ctx = document.getElementById('costChart').getContext('2d');
        
        // Destroy old chart if it exists to prevent overlap
        if(chart) chart.destroy();

        chart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Petrol', 'EV'],
                datasets: [{
                    label: 'Monthly Running Cost (₹)',
                    data: [pCost, eCost],
                    backgroundColor: ['#ff4d4d', '#2ecc71']
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        });
    }

    // Run once on load
    window.onload = calculate;
</script>

</body>
</html>
